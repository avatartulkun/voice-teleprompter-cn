<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>语音跟读提词器</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="提词器控制面板">
        <div class="brand-row">
          <div>
            <h1>语音跟读提词器</h1>
            <p>先测试麦克风，再开始朗读跟随。</p>
          </div>
          <span id="supportBadge" class="status-pill">检测中</span>
        </div>

        <div class="stepper" aria-label="使用步骤">
          <div class="step is-active" id="stepMic">
            <span>1</span>
            <strong>麦克风测试</strong>
          </div>
          <div class="step" id="stepRead">
            <span>2</span>
            <strong>提词跟读</strong>
          </div>
        </div>

        <section class="panel-block" aria-labelledby="micTitle">
          <div class="block-heading">
            <h2 id="micTitle">麦克风</h2>
            <span id="micStatus" class="subtle">未测试</span>
          </div>
          <div class="meter" aria-label="麦克风音量">
            <div id="volumeBar" class="meter-bar"></div>
          </div>
          <div class="button-row">
            <button id="testMicButton" type="button">测试麦克风</button>
            <button id="stopMicButton" type="button" class="secondary" disabled>停止测试</button>
          </div>
        </section>

        <section class="panel-block" aria-labelledby="scriptTitle">
          <div class="block-heading">
            <h2 id="scriptTitle">稿件</h2>
            <span id="wordCount" class="subtle">0 字</span>
          </div>
          <textarea id="scriptInput" spellcheck="false">大家好，欢迎使用语音跟读提词器。开始朗读后，系统会尝试识别你的声音，并把已经读过的文字标记为彩色。你可以把这里替换成自己的演讲稿。</textarea>
          <div class="settings-grid">
            <label>
              字号
              <input id="fontSizeInput" type="range" min="28" max="72" value="46">
            </label>
            <label>
              滚动速度
              <input id="scrollSpeedInput" type="range" min="0" max="3" value="1" step="0.5">
            </label>
          </div>
        </section>

        <section class="panel-block" aria-labelledby="listenTitle">
          <div class="block-heading">
            <h2 id="listenTitle">识别</h2>
            <span id="listenStatus" class="subtle">等待开始</span>
          </div>
          <div class="button-row">
            <button id="startButton" type="button" disabled>开始跟读</button>
            <button id="pauseButton" type="button" class="secondary" disabled>暂停</button>
            <button id="resetButton" type="button" class="secondary">重置</button>
          </div>
          <p id="transcriptOutput" class="transcript" aria-live="polite">识别结果会显示在这里。</p>
        </section>
      </section>

      <section class="teleprompter" aria-label="提词器显示区">
        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <article id="promptDisplay" class="prompt-display" tabindex="0"></article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
